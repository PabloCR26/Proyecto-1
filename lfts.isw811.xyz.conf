<VirtualHost *:80>
	ServerName lfts.isw811.xyz
	ServerAlias lfts.isw811.xyz

	ServerAdmin webmaster@localhost
	DocumentRoot /vagrant/sites/lfts.isw811.xyz
	DirectoryIndex index.php index.html

	<Directory /vagrant/sites/lfts.isw811.xyz>
		Options FollowSymLinks
		AllowOverride All
		Require all granted
	</Directory>

	ErrorLog ${APACHE_LOG_DIR}/lfts.isw811_error.log
	CustomLog ${APACHE_LOG_DIR}/lfts.isw811_access.log combined
</VirtualHost>
